<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PRO PEOPLE</title>

  <!-- PWA -->
  <link rel="apple-touch-icon" href="icono.png">
  <link rel="icon" type="image/png" href="icono.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a56db">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #0f172a;
    }

    /* ── Contenedor del iframe ── */
    .iframe-wrap {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden; /* Esconde el banner de Google que queda arriba */
    }

    #app-frame {
      border: none;
      width: 100%;
      /* Subir el iframe 42px para ocultar el banner de "Report abuse" */
      height: calc(100% + 42px);
      margin-top: -42px;
      display: block;
    }

    /* ── Splash de carga (visible mientras el iframe no responde) ── */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a56db 0%, #7e3af2 100%);
      color: white;
      font-family: 'Segoe UI', system-ui, sans-serif;
      z-index: 999;
      transition: opacity 0.5s ease;
      text-align: center;
      padding: 2rem;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .logo-wrap {
      width: 90px;
      height: 90px;
      border-radius: 22px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      animation: float 3s ease-in-out infinite;
      font-size: 2.5rem;
    }

    .logo-wrap img { width: 62px; height: 62px; object-fit: contain; }

    #splash h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.4rem;
    }

    #splash p {
      font-size: 0.9rem;
      opacity: 0.75;
      margin-bottom: 2rem;
    }

    .loader {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .loader span {
      width: 8px; height: 8px;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .loader span:nth-child(2) { animation-delay: 0.2s; }
    .loader span:nth-child(3) { animation-delay: 0.4s; }

    /* Botón de fallback manual (visible solo si falla) */
    #btn-fallback {
      display: none;
      background: white;
      color: #1a56db;
      padding: 0.8rem 2rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40%           { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Pantalla de carga (desaparece cuando el iframe confirma que cargó) -->
  <div id="splash">
    <div class="logo-wrap">
      <img src="icono.png" alt="PRO PEOPLE"
           onerror="this.style.display='none';this.parentElement.textContent='👥';">
    </div>
    <h1>PRO PEOPLE</h1>
    <p>Plataforma de Gestion de Talento Humano</p>
    <div class="loader">
      <span></span><span></span><span></span>
    </div>
    <!-- Aparece solo si el iframe falla tras 10s -->
    <button id="btn-fallback" onclick="goToApp()">Abrir Aplicacion &rarr;</button>
  </div>

  <!-- Iframe principal: margin-top negativo oculta el banner de Google -->
  <div class="iframe-wrap">
    <iframe
      id="app-frame"
      src="https://script.google.com/macros/s/AKfycbw2sLyW8VL3SxYHzh490K6uIDTnKHx-9eaFaAvPPh1XrIrLRop1b_TAQLjPEF_r11eO/exec"
      allow="camera; microphone; display-capture; geolocation"
      loading="eager">
    </iframe>
  </div>

  <script>
    const APP_URL = 'https://script.google.com/macros/s/AKfycbw2sLyW8VL3SxYHzh490K6uIDTnKHx-9eaFaAvPPh1XrIrLRop1b_TAQLjPEF_r11eO/exec';
    const splash  = document.getElementById('splash');
    const btnFb   = document.getElementById('btn-fallback');
    let   appReady = false;

    function hideSplash() {
      appReady = true;
      splash.classList.add('hidden');
      setTimeout(() => { splash.style.display = 'none'; }, 600);
    }

    function goToApp() {
      window.location.replace(APP_URL);
    }

    // ── CAPA 1: La propia app confirma que cargó (postMessage desde JS.html) ──
    window.addEventListener('message', function(e) {
      if (e.origin && e.origin.includes('google.com')) {
        if (e.data && (e.data.action === 'app_loaded' || e.data.action === 'force_reload')) {
          if (e.data.action === 'force_reload') {
            window.location.reload(true);
          } else {
            hideSplash();
          }
        }
      }
    });

    // ── CAPA 2: El iframe dispara onload (carga el DOM, incluso si es pagina de error) ──
    document.getElementById('app-frame').addEventListener('load', function() {
      // Damos 1s extra para que JS.html envie el postMessage
      setTimeout(function() {
        if (!appReady) {
          // Onload se disparo pero no llego postMessage -> puede ser la pagina de error de Google
          // Intentamos detectar si hay contenido util en el iframe
          try {
            // Si podemos leer el titulo, es cross-origin (GAS cargado = buena senal)
            // Si lanza SecurityError, el iframe cargo algo del mismo origen (error local)
            const t = document.getElementById('app-frame').contentDocument;
            // Si llego aqui sin error, es same-origin (raro) -> redirigir
            goToApp();
          } catch(secErr) {
            // SecurityError = iframe cargo contenido cross-origin = GAS cargo correctamente
            hideSplash();
          }
        }
      }, 1000);
    });

    // ── CAPA 3: Timeout total de 12 segundos ──
    // Si nada funciono, mostramos el boton de fallback
    setTimeout(function() {
      if (!appReady) {
        btnFb.style.display = 'inline-block';
      }
    }, 12000);

    // ── CAPA 4: Fallback definitivo a los 20 segundos ──
    // Si el usuario no hizo clic tampoco, redirigimos automaticamente
    setTimeout(function() {
      if (!appReady) {
        goToApp();
      }
    }, 20000);
  </script>
</body>
</html>
