<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PRO PEOPLE</title>

  <!-- PWA -->
  <link rel="apple-touch-icon" href="icono.png">
  <link rel="icon" type="image/png" href="icono.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a56db">

  <!-- Redirigir automaticamente despues de 1.5s (fallback) -->
  <meta http-equiv="refresh" content="2; url=https://script.google.com/macros/s/AKfycbw2sLyW8VL3SxYHzh490K6uIDTnKHx-9eaFaAvPPh1XrIrLRop1b_TAQLjPEF_r11eO/exec">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      height: 100%;
      width: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a56db 0%, #7e3af2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .splash {
      text-align: center;
      color: white;
      padding: 2rem;
      animation: fadeIn 0.6s ease;
    }

    .logo-wrap {
      width: 90px;
      height: 90px;
      border-radius: 22px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      animation: float 3s ease-in-out infinite;
    }

    .logo-wrap img {
      width: 62px;
      height: 62px;
      object-fit: contain;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.4rem;
    }

    p {
      font-size: 0.95rem;
      opacity: 0.8;
      margin-bottom: 2rem;
      font-weight: 500;
    }

    .loader {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .loader span {
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .loader span:nth-child(2) { animation-delay: 0.2s; }
    .loader span:nth-child(3) { animation-delay: 0.4s; }

    .btn-open {
      display: inline-block;
      background: white;
      color: #1a56db;
      padding: 0.8rem 2rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-open:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.25);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40%           { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo-wrap">
      <img src="icono.png" alt="PRO PEOPLE" onerror="this.style.display='none';this.parentElement.innerHTML='&#128101;';">
    </div>

    <h1>PRO PEOPLE</h1>
    <p>Plataforma de Gestion de Talento Humano</p>

    <div class="loader">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <a class="btn-open"
       href="https://script.google.com/macros/s/AKfycbw2sLyW8VL3SxYHzh490K6uIDTnKHx-9eaFaAvPPh1XrIrLRop1b_TAQLjPEF_r11eO/exec">
      Abrir Aplicacion
    </a>
  </div>

  <script>
    // Redireccion automatica por JS (mas rapida que el meta refresh)
    const APP_URL = 'https://script.google.com/macros/s/AKfycbw2sLyW8VL3SxYHzh490K6uIDTnKHx-9eaFaAvPPh1XrIrLRop1b_TAQLjPEF_r11eO/exec';
    setTimeout(function() { window.location.replace(APP_URL); }, 1500);
  </script>
</body>
</html>
