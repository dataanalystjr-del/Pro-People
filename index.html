<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PRO PEOPLE</title>
  
  <link rel="apple-touch-icon" href="icono.png">
  <link rel="icon" type="image/png" href="icono.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">

  <style>
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      width: 100%; 
      overflow: hidden;
      background-color: #070707; 
    }
    .iframe-container {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      -webkit-overflow-scrolling: touch;
      overflow-y: scroll;
    }
    iframe { 
      border: none; 
      width: 100%; 
      height: 100%; 
      display: block; 
    }

    /* Pantalla de bienvenida solo para Android */
    .android-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 2rem;
      text-align: center;
      background: linear-gradient(160deg, #0a0f1e 0%, #0f1b35 50%, #071428 100%);
    }
    .android-logo {
      width: 110px;
      height: 110px;
      border-radius: 24px;
      object-fit: contain;
      background: #000;
      padding: 12px;
      margin-bottom: 2rem;
      box-shadow: 0 8px 32px rgba(37,99,235,0.5);
    }
    .android-title {
      color: #fff;
      font-size: 2rem;
      font-weight: 800;
      font-family: 'Segoe UI', sans-serif;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }
    .android-sub {
      color: #64748b;
      font-size: 0.95rem;
      font-family: 'Segoe UI', sans-serif;
      margin-bottom: 3rem;
    }
    .btn-abrir {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Segoe UI', sans-serif;
      padding: 1rem 3rem;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 8px 30px rgba(37,99,235,0.5);
      border: none;
      cursor: pointer;
      letter-spacing: 0.3px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-abrir:active {
      opacity: 0.85;
      transform: scale(0.97);
    }
    .android-tip {
      color: #334155;
      font-size: 0.78rem;
      font-family: 'Segoe UI', sans-serif;
      margin-top: 2rem;
      max-width: 280px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <script>
    var scriptUrl = "https://script.google.com/macros/s/AKfycbw2sLyW8VL3SxYHzh490K6uIDTnKHx-9eaFaAvPPh1XrIrLRop1b_TAQLjPEF_r11eO/exec?rm=minimal";
    var isAndroid = /Android/i.test(navigator.userAgent);

    if (isAndroid) {
      // Android: botón manual para que el click del usuario evite la interceptación de Drive
      document.body.innerHTML = `
        <div class="android-screen">
          <img class="android-logo" src="icono.png" alt="PRO PEOPLE"
               onerror="this.style.display='none'">
          <h1 class="android-title">PRO PEOPLE</h1>
          <p class="android-sub">Portal del Empleado</p>
          <a class="btn-abrir" href="${scriptUrl}" target="_blank" rel="noopener">
            🚀 Ingresar a la App
          </a>
          <p class="android-tip">
            ¿Primera vez? Añádela a tu pantalla de inicio desde el menú de Chrome
            (⋮ → Añadir a pantalla de inicio) para acceso rápido.
          </p>
        </div>
      `;
    } else {
      // iOS y PC: iframe normal como siempre
      document.body.innerHTML = `
        <div class="iframe-container">
          <iframe src="${scriptUrl}"
            allow="camera; microphone; display-capture; geolocation">
          </iframe>
        </div>
      `;
    }
  </script>

</body>
</html>
